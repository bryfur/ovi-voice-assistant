# Ovi — Open Voice Assistant — BLE firmware for Home Assistant Voice Preview Edition
#
# This variant uses Bluetooth Low Energy instead of WiFi.
# No WiFi network required — connects directly to a nearby server via BLE.
#
# Usage:
#   1. Flash: esphome run esphome/voice-pe-ble.yaml
#   2. Start the server: ovi --ble
#
# NOTE: This is experimental. WiFi version (voice-pe.yaml) is recommended
# for production use.

substitutions:
  voice_assist_idle_phase_id: "1"
  voice_assist_waiting_for_command_phase_id: "2"
  voice_assist_listening_for_command_phase_id: "3"
  voice_assist_thinking_phase_id: "4"
  voice_assist_replying_phase_id: "5"
  voice_assist_not_ready_phase_id: "10"
  voice_assist_error_phase_id: "11"
  wake_word_triggered_sound_file: "https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/wake_word_triggered.flac"

# Ovi voice assistant + voice_kit from voice-pe repo
external_components:
  - source:
      type: local
      path: components
    components:
      - ovi_voice_assistant
      - ovi_audio_codec
  - source:
      type: git
      url: https://github.com/esphome/home-assistant-voice-pe
      ref: dev
    components:
      - voice_kit
    refresh: 0s

esphome:
  name: voice-pe-ble
  friendly_name: Voice Assistant BLE
  name_add_mac_suffix: true
  min_version: "2025.3.0"
  on_boot:
    priority: 375
    then:
      - script.execute: control_leds
      - delay: 1s
      - switch.turn_on: internal_speaker_amp
      - number.set:
          id: speaker_volume
          value: 60
      - micro_wake_word.start:

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  cpu_frequency: 240MHz
  flash_size: 16MB
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_ESP32S3_INSTRUCTION_CACHE_32KB: "y"
      CONFIG_SPIRAM_RODATA: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_BT_ALLOCATION_FROM_SPIRAM_FIRST: "y"
      CONFIG_BT_BLE_DYNAMIC_ENV_MEMORY: "y"
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"

psram:
  mode: octal
  speed: 80MHz

logger:
  level: DEBUG

# No wifi, no api, no ota (BLE only)

esp32_ble_server:
  id: ble_server

# --- Hardware ---

i2c:
  - id: internal_i2c
    sda: GPIO5
    scl: GPIO6
    frequency: 400kHz

i2s_audio:
  - id: i2s_output
    i2s_lrclk_pin: GPIO7
    i2s_bclk_pin: GPIO8
  - id: i2s_input
    i2s_lrclk_pin: GPIO14
    i2s_bclk_pin: GPIO13

audio_dac:
  - platform: aic3204
    id: aic3204_dac
    i2c_id: internal_i2c

microphone:
  - platform: i2s_audio
    id: i2s_mics
    i2s_din_pin: GPIO15
    adc_type: external
    pdm: false
    sample_rate: 16000
    bits_per_sample: 32bit
    i2s_mode: secondary
    i2s_audio_id: i2s_input
    channel: stereo

speaker:
  - platform: i2s_audio
    id: i2s_audio_speaker
    sample_rate: 48000
    i2s_mode: secondary
    i2s_dout_pin: GPIO10
    bits_per_sample: 32bit
    i2s_audio_id: i2s_output
    dac_type: external
    channel: stereo
    timeout: 500ms
    buffer_duration: 100ms
    audio_dac: aic3204_dac

  - platform: mixer
    id: audio_mixer
    output_speaker: i2s_audio_speaker
    source_speakers:
      - id: voice_mixing_input
      - id: media_mixing_input

  - platform: resampler
    id: voice_resampler
    output_speaker: voice_mixing_input
    sample_rate: 48000
    bits_per_sample: 16

  - platform: resampler
    id: media_resampler
    output_speaker: media_mixing_input
    sample_rate: 48000
    bits_per_sample: 16

media_player:
  - platform: speaker_source
    id: sound_player
    name: "Speaker"
    announcement_pipeline:
      speaker: media_resampler
      sources:
        - audio_file_source

binary_sensor:
  - platform: gpio
    id: hardware_mute_switch
    pin: GPIO3
    internal: true
    on_press:
      - microphone.mute:
      - script.execute: control_leds
    on_release:
      - microphone.unmute:
      - script.execute: control_leds

  - platform: gpio
    id: center_button
    pin:
      number: GPIO0
      inverted: true
    on_multi_click:
      - timing:
          - ON for at most 0.5s
          - OFF for at least 0.3s
        then:
          - if:
              condition:
                lambda: return id(voice_asst).is_running();
              then:
                - lambda: id(voice_asst).request_stop();
              else:
                - lambda: id(voice_asst).request_start("");
      - timing:
          - ON for at most 0.5s
          - OFF for at most 0.3s
          - ON for at most 0.5s
          - OFF for at least 0.3s
        then:
          - switch.toggle: master_mute_switch

button:
  - platform: template
    id: announce_trigger
    name: "Announce"
    entity_category: diagnostic
    on_press:
      - lambda: id(voice_asst).request_start("");

switch:
  - platform: gpio
    pin: GPIO47
    id: internal_speaker_amp
    restore_mode: ALWAYS_OFF
    internal: true

  - platform: template
    id: master_mute_switch
    name: Mute
    icon: "mdi:microphone-off"
    restore_mode: RESTORE_DEFAULT_OFF
    lambda: |-
      if (id(hardware_mute_switch).state || id(i2s_mics).get_mute_state()) {
        return true;
      } else {
        return false;
      }
    turn_on_action:
      - if:
          condition:
            binary_sensor.is_off: hardware_mute_switch
          then:
            - microphone.mute:
    turn_off_action:
      - if:
          condition:
            binary_sensor.is_off: hardware_mute_switch
          then:
            - microphone.unmute:
    on_turn_on:
      - script.execute: control_leds
    on_turn_off:
      - script.execute: control_leds

  - platform: template
    id: wake_sound
    name: Wake sound
    icon: "mdi:bullhorn"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON

number:
  - platform: template
    id: speaker_volume
    name: "Speaker Volume"
    min_value: 0
    max_value: 100
    step: 5
    initial_value: 60
    restore_value: true
    optimistic: true
    unit_of_measurement: "%"
    set_action:
      - audio_dac.set_volume:
          id: aic3204_dac
          volume: !lambda return x / 100.0;

sensor:
  - platform: rotary_encoder
    id: dial
    pin_a: GPIO16
    pin_b: GPIO18
    resolution: 2
    on_clockwise:
      - lambda: |-
          id(dial_touched) = true;
          float vol = id(speaker_volume).state + 5.0f;
          if (vol > 100) vol = 100;
          auto call = id(speaker_volume).make_call();
          call.set_value(vol);
          call.perform();
      - script.execute: control_leds
      - script.execute: control_volume_timeout
    on_anticlockwise:
      - lambda: |-
          id(dial_touched) = true;
          float vol = id(speaker_volume).state - 5.0f;
          if (vol < 0) vol = 0;
          auto call = id(speaker_volume).make_call();
          call.set_value(vol);
          call.perform();
      - script.execute: control_leds
      - script.execute: control_volume_timeout

audio_file:
  - id: wake_word_triggered_sound
    file: ${wake_word_triggered_sound_file}

media_source:
  - platform: audio_file
    id: audio_file_source

voice_kit:
  id: voice_kit_component
  i2c_id: internal_i2c
  reset_pin: GPIO4
  firmware:
    url: "https://github.com/esphome/voice-kit-xmos-firmware/releases/download/v1.3.1/ffva_v1.3.1_upgrade.bin"
    version: "1.3.1"
    md5: "964635c5bf125529dab14a2472a15401"

# --- Wake Word ---

micro_wake_word:
  id: mww
  microphone:
    microphone: i2s_mics
    channels: 1
    gain_factor: 4
  stop_after_detection: false
  models:
    - model:
        type: local
        path: custom_wake_word/hey_ovi.json
      id: hey_ovi
    - model: "https://github.com/kahrendt/microWakeWord/releases/download/stop/stop.json"
      id: stop
      internal: true
  on_wake_word_detected:
    - if:
        condition:
          switch.is_off: master_mute_switch
        then:
          - if:
              condition:
                lambda: return wake_word == "stop";
              then:
                - lambda: id(voice_asst).request_stop();
              else:
                - logger.log:
                    format: "Wake word detected: %s"
                    args: ['wake_word.c_str()']
                - if:
                    condition:
                      lambda: return id(voice_asst).is_running();
                    then:
                      - lambda: id(voice_asst).request_stop();
                      - delay: 100ms
                - if:
                    condition:
                      switch.is_on: wake_sound
                    then:
                      - script.execute: play_wake_sound
                      - delay: 300ms
                - lambda: id(voice_asst).request_start(wake_word);

# --- Ovi Voice Assistant (BLE) ---

ovi_voice_assistant:
  id: voice_asst
  transport: ble
  codec: lc3
  ble_server: ble_server
  microphone:
    microphone: i2s_mics
    channels: 0
  speaker: voice_resampler
  speaker_buffer_size: 16648

  on_client_connected:
    - logger.log: "BLE client connected"
    - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
    - script.execute: control_leds

  on_client_disconnected:
    - logger.log: "BLE client disconnected"
    - lambda: id(voice_asst).request_stop();
    - lambda: id(voice_assistant_phase) = ${voice_assist_not_ready_phase_id};
    - script.execute: control_leds

  on_listening:
    - lambda: id(voice_assistant_phase) = ${voice_assist_waiting_for_command_phase_id};
    - script.execute: control_leds

  on_stt_vad_start:
    - lambda: id(voice_assistant_phase) = ${voice_assist_listening_for_command_phase_id};
    - script.execute: control_leds

  on_stt_vad_end:
    - lambda: id(voice_assistant_phase) = ${voice_assist_thinking_phase_id};
    - script.execute: control_leds

  on_stt_end:
    - logger.log:
        format: "Heard: %s"
        args: ['x.c_str()']

  on_tts_start:
    - lambda: id(voice_assistant_phase) = ${voice_assist_replying_phase_id};
    - script.execute: control_leds

  on_tts_stream_start:
    - logger.log: "Speaking..."

  on_end:
    - if:
        condition:
          lambda: return id(voice_assistant_phase) == ${voice_assist_error_phase_id};
        then:
          - delay: 1s
    - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
    - script.execute: control_leds

  on_error:
    - if:
        condition:
          lambda: return code != "stt-no-text-recognized";
        then:
          - logger.log:
              format: "Error: %s - %s"
              args: ['code.c_str()', 'message.c_str()']
          - lambda: id(voice_assistant_phase) = ${voice_assist_error_phase_id};
          - script.execute: control_leds

# --- LED Ring (identical to WiFi version) ---

globals:
  - id: global_led_animation_index
    type: int
    restore_value: no
    initial_value: "0"
  - id: voice_assistant_phase
    type: int
    restore_value: no
    initial_value: ${voice_assist_not_ready_phase_id}
  - id: dial_touched
    type: bool
    restore_value: no
    initial_value: "false"

power_supply:
  - id: led_power
    pin: GPIO45

light:
  - platform: esp32_rmt_led_strip
    id: leds_internal
    pin: GPIO21
    chipset: WS2812
    max_refresh_rate: 15ms
    num_leds: 12
    rgb_order: GRB
    rmt_symbols: 192
    default_transition_length: 0ms
    power_supply: led_power

  - platform: partition
    id: led_ring
    name: "LED Ring"
    default_transition_length: 0ms
    segments:
      - id: leds_internal
        from: 0
        to: 11

  - platform: partition
    id: voice_assistant_leds
    internal: true
    default_transition_length: 0ms
    segments:
      - id: leds_internal
        from: 7
        to: 11
      - id: leds_internal
        from: 0
        to: 6
    effects:
      - addressable_lambda:
          name: "Waiting for Command"
          update_interval: 100ms
          lambda: |-
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                  light_color.get_blue() * 255);
            for (uint8_t i = 0; i < 12; i++) {
              if (i == id(global_led_animation_index) % 12) {
                it[i] = color;
              } else if (i == (id(global_led_animation_index) + 11) % 12) {
                it[i] = color * 192;
              } else if (i == (id(global_led_animation_index) + 10) % 12) {
                it[i] = color * 128;
              } else if (i == (id(global_led_animation_index) + 6) % 12) {
                it[i] = color;
              } else if (i == (id(global_led_animation_index) + 5) % 12) {
                it[i] = color * 192;
              } else if (i == (id(global_led_animation_index) + 4) % 12) {
                it[i] = color * 128;
              } else {
                it[i] = Color::BLACK;
              }
            }
            id(global_led_animation_index) = (id(global_led_animation_index) + 1) % 12;

      - addressable_lambda:
          name: "Listening For Command"
          update_interval: 50ms
          lambda: |-
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                  light_color.get_blue() * 255);
            for (uint8_t i = 0; i < 12; i++) {
              if (i == id(global_led_animation_index) % 12) {
                it[i] = color;
              } else if (i == (id(global_led_animation_index) + 11) % 12) {
                it[i] = color * 192;
              } else if (i == (id(global_led_animation_index) + 10) % 12) {
                it[i] = color * 128;
              } else if (i == (id(global_led_animation_index) + 6) % 12) {
                it[i] = color;
              } else if (i == (id(global_led_animation_index) + 5) % 12) {
                it[i] = color * 192;
              } else if (i == (id(global_led_animation_index) + 4) % 12) {
                it[i] = color * 128;
              } else {
                it[i] = Color::BLACK;
              }
            }
            id(global_led_animation_index) = (id(global_led_animation_index) + 1) % 12;

      - addressable_lambda:
          name: "Thinking"
          update_interval: 10ms
          lambda: |-
            static uint8_t brightness_step = 0;
            static bool brightness_decreasing = true;
            static uint8_t brightness_step_number = 10;
            if (initial_run) {
              brightness_step = 0;
              brightness_decreasing = true;
            }
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                  light_color.get_blue() * 255);
            for (uint8_t i = 0; i < 12; i++) {
              if (i == id(global_led_animation_index) % 12) {
                it[i] = color * uint8_t(255/brightness_step_number*(brightness_step_number-brightness_step));
              } else if (i == (id(global_led_animation_index) + 6) % 12) {
                it[i] = color * uint8_t(255/brightness_step_number*(brightness_step_number-brightness_step));
              } else {
                it[i] = Color::BLACK;
              }
            }
            if (brightness_decreasing) {
              brightness_step++;
            } else {
              brightness_step--;
            }
            if (brightness_step == 0 || brightness_step == brightness_step_number) {
              brightness_decreasing = !brightness_decreasing;
            }

      - addressable_lambda:
          name: "Replying"
          update_interval: 50ms
          lambda: |-
            id(global_led_animation_index) = (12 + id(global_led_animation_index) - 1) % 12;
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                  light_color.get_blue() * 255);
            for (uint8_t i = 0; i < 12; i++) {
              if (i == (id(global_led_animation_index)) % 12) {
                it[i] = color;
              } else if (i == ( id(global_led_animation_index) + 1) % 12) {
                it[i] = color * 192;
              } else if (i == ( id(global_led_animation_index) + 2) % 12) {
                it[i] = color * 128;
              } else if (i == ( id(global_led_animation_index) + 6) % 12) {
                it[i] = color;
              } else if (i == ( id(global_led_animation_index) + 7) % 12) {
                it[i] = color * 192;
              } else if (i == ( id(global_led_animation_index) + 8) % 12) {
                it[i] = color * 128;
              } else {
                it[i] = Color::BLACK;
              }
            }

      - addressable_lambda:
          name: "Error"
          update_interval: 10ms
          lambda: |-
            static uint8_t brightness_step = 0;
            static bool brightness_decreasing = true;
            static uint8_t brightness_step_number = 10;
            if (initial_run) {
              brightness_step = 0;
              brightness_decreasing = true;
            }
            Color error_color(255, 0, 0);
            for (uint8_t i = 0; i < 12; i++) {
              it[i] = error_color * uint8_t(255/brightness_step_number*(brightness_step_number-brightness_step));
            }
            if (brightness_decreasing) {
              brightness_step++;
            } else {
              brightness_step--;
            }
            if (brightness_step == 0 || brightness_step == brightness_step_number) {
              brightness_decreasing = !brightness_decreasing;
            }

      - addressable_twinkle:
          name: "Twinkle"
          twinkle_probability: 50%

      - addressable_lambda:
          name: "Muted"
          update_interval: 16ms
          lambda: |-
            Color muted_color(255, 0, 0);
            for (uint8_t i = 0; i < 12; i++) {
              it[i] = Color::BLACK;
            }
            it[3] = muted_color;
            it[9] = muted_color;

      - addressable_lambda:
          name: "Volume Display"
          update_interval: 50ms
          lambda: |-
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                  light_color.get_blue() * 255);
            Color silenced_color(255, 0, 0);
            float volume = id(speaker_volume).state / 100.0f;
            auto volume_ratio = 12.0f * volume;
            for (uint8_t i = 0; i < 12; i++) {
              if (i <= volume_ratio) {
                it[(6+i)%12] = color * min( 255.0f * (volume_ratio - i) , 255.0f ) ;
              } else {
                it[(6+i)%12] = Color::BLACK;
              }
            }
            if (volume == 0.0f) {
              it[6] = silenced_color;
            }

# --- LED Control Scripts ---

script:
  - id: control_leds
    then:
      - lambda: |-
          if (!id(voice_asst).is_connected()) {
            id(control_leds_not_ready).execute();
          } else if (id(master_mute_switch).state) {
            id(control_leds_muted).execute();
          } else if (id(dial_touched)) {
            id(control_leds_volume).execute();
          } else if (id(voice_assistant_phase) == ${voice_assist_waiting_for_command_phase_id}) {
            id(control_leds_waiting).execute();
          } else if (id(voice_assistant_phase) == ${voice_assist_listening_for_command_phase_id}) {
            id(control_leds_listening).execute();
          } else if (id(voice_assistant_phase) == ${voice_assist_thinking_phase_id}) {
            id(control_leds_thinking).execute();
          } else if (id(voice_assistant_phase) == ${voice_assist_replying_phase_id}) {
            id(control_leds_replying).execute();
          } else if (id(voice_assistant_phase) == ${voice_assist_error_phase_id}) {
            id(control_leds_error).execute();
          } else if (id(voice_assistant_phase) == ${voice_assist_not_ready_phase_id}) {
            id(control_leds_not_ready).execute();
          } else if (id(voice_assistant_phase) == ${voice_assist_idle_phase_id}) {
            id(control_leds_idle).execute();
          }

  - id: control_leds_waiting
    then:
      - light.turn_on:
          id: voice_assistant_leds
          brightness: !lambda return max(id(led_ring).current_values.get_brightness(), 0.2f);
          effect: "Waiting for Command"

  - id: control_leds_listening
    then:
      - light.turn_on:
          id: voice_assistant_leds
          brightness: !lambda return max(id(led_ring).current_values.get_brightness(), 0.2f);
          effect: "Listening For Command"

  - id: control_leds_thinking
    then:
      - light.turn_on:
          id: voice_assistant_leds
          brightness: !lambda return max(id(led_ring).current_values.get_brightness(), 0.2f);
          effect: "Thinking"

  - id: control_leds_replying
    then:
      - light.turn_on:
          id: voice_assistant_leds
          brightness: !lambda return max(id(led_ring).current_values.get_brightness(), 0.2f);
          effect: "Replying"

  - id: control_leds_error
    then:
      - light.turn_on:
          id: voice_assistant_leds
          brightness: !lambda return min(max(id(led_ring).current_values.get_brightness(), 0.2f) + 0.1f, 1.0f);
          red: 1
          green: 0
          blue: 0
          effect: "Error"

  - id: control_leds_not_ready
    then:
      - light.turn_on:
          id: voice_assistant_leds
          brightness: 66%
          red: 1
          green: 0
          blue: 0
          effect: "Twinkle"

  - id: control_leds_volume
    then:
      - light.turn_on:
          id: voice_assistant_leds
          brightness: !lambda return max(id(led_ring).current_values.get_brightness(), 0.2f);
          effect: "Volume Display"

  - id: control_leds_muted
    then:
      - light.turn_on:
          id: voice_assistant_leds
          brightness: !lambda return max(id(led_ring).current_values.get_brightness(), 0.2f);
          effect: "Muted"

  - id: control_leds_idle
    then:
      - light.turn_off: voice_assistant_leds
      - if:
          condition:
            light.is_on: led_ring
          then:
            light.turn_on: led_ring

  - id: control_volume_timeout
    mode: restart
    then:
      - delay: 500ms
      - lambda: id(dial_touched) = false;
      - sensor.rotary_encoder.set_value:
          id: dial
          value: 0
      - script.execute: control_leds

  - id: play_wake_sound
    then:
      - media_player.play_media:
          id: sound_player
          media_url: "audio-file://wake_word_triggered_sound"
          announcement: true
