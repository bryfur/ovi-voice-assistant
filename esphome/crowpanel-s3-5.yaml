# Ovi — Open Voice Assistant — ESPHome config for Elecrow CrowPanel Advance 5" ESP32-S3
#
# The CrowPanel Advance 5" has an ESP32-S3-WROOM-1-N16R8 with 16 MB flash,
# 8 MB PSRAM, a 800x480 IPS touchscreen, I2S microphone, and NS4168 I2S
# speaker amplifier.  Built-in WiFi — no companion chip needed.
#
# Hardware:
#   - I2S microphone:    BCLK=GPIO19, WS=GPIO2, DIN=GPIO20
#   - NS4168 speaker:    BCLK=GPIO5, WS=GPIO6, DOUT=GPIO4
#   - I2C (touch):       SDA=GPIO15, SCL=GPIO16
#   - Button (boot):     GPIO0
#
# Also works with the 4.3" and 7.0" CrowPanel Advance S3 models (same pins).
#
# Usage:
#   1. Install ESPHome: pip install esphome   (or `uv sync --group dev`)
#   2. Flash: ovi --flash (or: esphome run esphome/crowpanel-s3-5.yaml)
#   4. Start the server: ovi crowpanel-s3-XXXX.local

substitutions:
  wifi_ssid: !secret wifi_ssid
  wifi_password: !secret wifi_password
  api_encryption_key: !secret api_encryption_key

  voice_assist_idle_phase_id: "1"
  voice_assist_waiting_for_command_phase_id: "2"
  voice_assist_listening_for_command_phase_id: "3"
  voice_assist_thinking_phase_id: "4"
  voice_assist_replying_phase_id: "5"
  voice_assist_not_ready_phase_id: "10"
  voice_assist_error_phase_id: "11"
  wake_word_triggered_sound_file: "https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/wake_word_triggered.flac"

external_components:
  - source:
      type: local
      path: components
    components:
      - ovi_voice_assistant
      - ovi_audio_codec

esphome:
  name: crowpanel-s3
  friendly_name: CrowPanel S3 Voice
  name_add_mac_suffix: true
  min_version: "2025.3.0"
  platformio_options:
    build_flags: "-DBOARD_HAS_PSRAM"
    board_build.esp-idf.memory_type: qio_opi
    board_build.flash_mode: dio
  on_boot:
    priority: 600
    then:
      # Wake the I2C backlight controller
      - lambda: |-
          uint8_t cmd[1] = { 0x10 };
          id(bus_a).write(0x30, cmd, 1);
      - number.set:
          id: speaker_volume
          value: 60

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_SPIRAM_RODATA: "y"

psram:
  mode: octal
  speed: 80MHz

logger:
  level: DEBUG
  hardware_uart: UART0

api:
  id: api_id
  reboot_timeout: 0s
  encryption:
    key: "${api_encryption_key}"

ota:
  - platform: esphome

wifi:
  ssid: "${wifi_ssid}"
  password: "${wifi_password}"
  power_save_mode: none

# --- I2C (touch + backlight controller) ---

i2c:
  - id: bus_a
    sda: GPIO15
    scl: GPIO16
    frequency: 400kHz

# --- Audio hardware ---
# Separate I2S buses for mic and speaker — full duplex.

i2s_audio:
  - id: i2s_speaker
    i2s_lrclk_pin: GPIO6
    i2s_bclk_pin: GPIO5
  - id: i2s_mic
    i2s_lrclk_pin: GPIO2
    i2s_bclk_pin: GPIO19

microphone:
  - platform: i2s_audio
    id: panel_mic
    i2s_din_pin: GPIO20
    adc_type: external
    pdm: false
    sample_rate: 16000
    bits_per_sample: 16bit
    channel: left
    i2s_audio_id: i2s_mic

speaker:
  # Physical I2S speaker (NS4168)
  - platform: i2s_audio
    id: i2s_audio_speaker
    i2s_dout_pin: GPIO4
    dac_type: external
    sample_rate: 48000
    bits_per_sample: 16bit
    channel: mono
    i2s_audio_id: i2s_speaker
    timeout: 2000ms
    buffer_duration: 100ms

  # Mixer combines voice assistant + media player audio
  - platform: mixer
    id: audio_mixer
    output_speaker: i2s_audio_speaker
    source_speakers:
      - id: voice_mixing_input
      - id: media_mixing_input

  # Voice assistant audio path (API streamed TTS)
  - platform: resampler
    id: voice_resampler
    output_speaker: voice_mixing_input
    sample_rate: 48000
    bits_per_sample: 16

  # Media player audio path (wake sounds, notifications)
  - platform: resampler
    id: media_resampler
    output_speaker: media_mixing_input
    sample_rate: 48000
    bits_per_sample: 16

# --- Wake sound ---

audio_file:
  - id: wake_word_triggered_sound
    file: ${wake_word_triggered_sound_file}

media_source:
  - platform: audio_file
    id: audio_file_source

media_player:
  - platform: speaker_source
    id: sound_player
    name: "Speaker"
    announcement_pipeline:
      speaker: media_resampler
      sources:
        - audio_file_source

# --- Mute ---

switch:
  - platform: template
    id: mute_switch
    name: Mute
    icon: "mdi:microphone-off"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - microphone.mute:
    turn_off_action:
      - microphone.unmute:

  - platform: template
    id: wake_sound
    name: Wake sound
    icon: "mdi:bullhorn"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON

# --- Button (boot button on GPIO0) ---

binary_sensor:
  - platform: gpio
    id: action_button
    pin:
      number: GPIO0
      inverted: true
      mode:
        input: true
    on_multi_click:
      # Single press — toggle voice assistant
      - timing:
          - ON for at most 0.5s
          - OFF for at least 0.3s
        then:
          - if:
              condition:
                lambda: return id(voice_asst).is_running();
              then:
                - lambda: id(voice_asst).request_stop();
              else:
                - lambda: id(voice_asst).request_start("");
      # Long press — toggle mute
      - timing:
          - ON for at least 1.5s
        then:
          - switch.toggle: mute_switch

button:
  - platform: template
    id: announce_trigger
    name: "Announce"
    entity_category: diagnostic
    on_press:
      - lambda: id(voice_asst).request_start("");

# --- Volume control ---

number:
  - platform: template
    id: speaker_volume
    name: "Speaker Volume"
    min_value: 0
    max_value: 100
    step: 5
    initial_value: 60
    restore_value: true
    optimistic: true
    unit_of_measurement: "%"

# --- Wake Word ---

micro_wake_word:
  id: mww
  microphone: panel_mic
  stop_after_detection: false
  models:
    - model:
        type: local
        path: custom_wake_word/hey_ovi.json
      id: hey_ovi
    - model: "https://github.com/kahrendt/microWakeWord/releases/download/stop/stop.json"
      id: stop
      internal: true
  on_wake_word_detected:
    - if:
        condition:
          switch.is_off: mute_switch
        then:
          - if:
              condition:
                lambda: return wake_word == "stop";
              then:
                - lambda: id(voice_asst).request_stop();
              else:
                - logger.log:
                    format: "Wake word detected: %s"
                    args: ['wake_word.c_str()']
                - if:
                    condition:
                      lambda: return id(voice_asst).is_running();
                    then:
                      - lambda: id(voice_asst).request_stop();
                      - delay: 100ms
                - if:
                    condition:
                      switch.is_on: wake_sound
                    then:
                      - script.execute: play_wake_sound
                      - delay: 300ms
                - lambda: id(voice_asst).request_start(wake_word);

# --- Voice Assistant ---

globals:
  - id: voice_assistant_phase
    type: int
    restore_value: no
    initial_value: ${voice_assist_not_ready_phase_id}

time:
  - platform: sntp
    id: sntp_time
    servers:
      - 0.pool.ntp.org
      - 1.pool.ntp.org

ovi_voice_assistant:
  id: voice_asst
  transport: wifi
  codec: lc3
  time_id: sntp_time
  microphone:
    microphone: panel_mic
    channels: 0
    gain_factor: 4
  speaker: voice_resampler
  micro_wake_word: mww
  shared_audio_bus: false
  speaker_buffer_size: 65536

  on_client_connected:
    - logger.log: "Server connected"
    - micro_wake_word.start:
    - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};

  on_client_disconnected:
    - logger.log: "Server disconnected"
    - lambda: id(voice_asst).request_stop();
    - micro_wake_word.stop:
    - lambda: id(voice_assistant_phase) = ${voice_assist_not_ready_phase_id};

  on_listening:
    - lambda: id(voice_assistant_phase) = ${voice_assist_waiting_for_command_phase_id};

  on_stt_vad_start:
    - lambda: id(voice_assistant_phase) = ${voice_assist_listening_for_command_phase_id};

  on_stt_vad_end:
    - lambda: id(voice_assistant_phase) = ${voice_assist_thinking_phase_id};

  on_stt_end:
    - logger.log:
        format: "Heard: %s"
        args: ['x.c_str()']

  on_tts_start:
    - lambda: id(voice_assistant_phase) = ${voice_assist_replying_phase_id};

  on_tts_stream_start:
    - logger.log: "Speaking..."

  on_end:
    - if:
        condition:
          lambda: return id(voice_assistant_phase) == ${voice_assist_error_phase_id};
        then:
          - delay: 1s
    - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};

  on_error:
    - if:
        condition:
          lambda: return code != "stt-no-text-recognized";
        then:
          - logger.log:
              format: "Voice error: %s — %s"
              args: ['code.c_str()', 'message.c_str()']
          - lambda: id(voice_assistant_phase) = ${voice_assist_error_phase_id};

# --- Scripts ---

script:
  - id: play_wake_sound
    then:
      - media_player.play_media:
          id: sound_player
          media_url: "audio-file://wake_word_triggered_sound"
          announcement: true
