# Ovi — Open Voice Assistant — ESPHome config for M5Stack ATOM Echo
#
# The ATOM Echo (ESP32-PICO-D4, no PSRAM) *can* run microWakeWord with small
# models (~60 KB .tflite).  The hey_ovi model fits comfortably.  Memory is
# tight — avoid adding large sound files or extra components.
#
# Hardware (M5Stack ATOM Echo):
#   - SPM1423 PDM mic:  CLK=GPIO33, DATA=GPIO23
#   - NS4168 I2S DAC:   BCLK=GPIO19, LRCLK=GPIO33, DATA=GPIO22
#     (GPIO33 is shared between mic clock and speaker LRCLK; the state machine
#      ensures mic and speaker never run simultaneously, which is fine for a
#      half-duplex assistant.)
#   - Button:           GPIO39 (active low)
#   - LED (SK6812):     GPIO27
#
# Usage:
#   1. Install ESPHome: pip install esphome   (or `uv sync` for the dev group)
#   2. Flash: ovi --flash (or: esphome run esphome/atom-echo.yaml)
#   4. Start the server:
#        ovi atom-echo-XXXX.local

substitutions:
  wifi_ssid: !secret wifi_ssid
  wifi_password: !secret wifi_password
  api_encryption_key: !secret api_encryption_key

  voice_assist_idle_phase_id: "1"
  voice_assist_listening_phase_id: "3"
  voice_assist_thinking_phase_id: "4"
  voice_assist_replying_phase_id: "5"
  voice_assist_not_ready_phase_id: "10"
  voice_assist_error_phase_id: "11"

external_components:
  - source:
      type: local
      path: components
    components:
      - ovi_voice_assistant
      - ovi_audio_codec

esphome:
  name: atom-echo
  friendly_name: ATOM Echo Voice
  name_add_mac_suffix: true
  min_version: "2025.3.0"
  on_boot:
    priority: 600
    then:
      - light.turn_on:
          id: status_led
          red: 1
          green: 0
          blue: 0
          brightness: 30%

esp32:
  board: m5stack-atom
  framework:
    type: esp-idf
    version: recommended

logger:
  level: DEBUG

api:
  id: api_id
  reboot_timeout: 0s
  encryption:
    key: "${api_encryption_key}"

ota:
  - platform: esphome

wifi:
  ssid: "${wifi_ssid}"
  password: "${wifi_password}"
  power_save_mode: none
  on_connect:
    - light.turn_on:
        id: status_led
        red: 0
        green: 0
        blue: 1
        brightness: 30%
  on_disconnect:
    - light.turn_on:
        id: status_led
        red: 1
        green: 0
        blue: 0
        brightness: 30%

# --- Audio hardware ---
# Single I2S peripheral; mic (PDM) and speaker share GPIO33. Half-duplex.

i2s_audio:
  - id: i2s_bus
    i2s_lrclk_pin: GPIO33
    i2s_bclk_pin: GPIO19

microphone:
  - platform: i2s_audio
    id: echo_mic
    i2s_din_pin: GPIO23
    adc_type: external
    pdm: true
    sample_rate: 16000
    correct_dc_offset: true
    i2s_audio_id: i2s_bus

speaker:
  - platform: i2s_audio
    id: echo_speaker
    i2s_dout_pin: GPIO22
    dac_type: external
    sample_rate: 16000
    bits_per_sample: 16bit
    channel: mono
    i2s_audio_id: i2s_bus
    timeout: 500ms
    buffer_duration: 100ms

# --- Button (front face of the ATOM Echo) ---

binary_sensor:
  - platform: gpio
    id: action_button
    pin:
      number: GPIO39
      inverted: true
      mode:
        input: true
    on_multi_click:
      # Single press — manually trigger a session (push-to-talk fallback)
      - timing:
          - ON for at most 0.5s
          - OFF for at least 0.3s
        then:
          - if:
              condition:
                lambda: return id(voice_asst).is_running();
              then:
                - lambda: id(voice_asst).request_stop();
              else:
                - lambda: id(voice_asst).request_start("");
      # Long press — toggle mute
      - timing:
          - ON for at least 1.5s
        then:
          - switch.toggle: mute_switch

switch:
  - platform: template
    id: mute_switch
    name: Mute
    icon: "mdi:microphone-off"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - microphone.mute:
      - light.turn_on:
          id: status_led
          red: 1
          green: 0
          blue: 0
          brightness: 50%
    turn_off_action:
      - microphone.unmute:
      - script.execute: control_led

# --- Status LED (single SK6812 on GPIO27) ---

light:
  - platform: esp32_rmt_led_strip
    id: status_led
    pin: GPIO27
    chipset: SK6812
    rgb_order: GRB
    num_leds: 1
    rmt_symbols: 192
    default_transition_length: 0ms
    name: "Status LED"

globals:
  - id: voice_assistant_phase
    type: int
    restore_value: no
    initial_value: ${voice_assist_not_ready_phase_id}

# --- Wake Word ---
#
# microWakeWord works on the plain ESP32 with small models (~60 KB).
# Memory is tight — only use pre-built or small custom models.
# The hey_ovi model is 61 KB and fits comfortably.

micro_wake_word:
  id: mww
  microphone: echo_mic
  stop_after_detection: false
  models:
    - model:
        type: local
        path: custom_wake_word/hey_ovi.json
      id: hey_ovi
  on_wake_word_detected:
    - if:
        condition:
          switch.is_off: mute_switch
        then:
          - logger.log:
              format: "Wake word detected: %s"
              args: ['wake_word.c_str()']
          - if:
              condition:
                lambda: return !id(voice_asst).is_running();
              then:
                - lambda: id(voice_asst).request_start(wake_word);

# --- NTP Time Sync (for multi-device music sync) ---

time:
  - platform: sntp
    id: sntp_time
    servers:
      - 0.pool.ntp.org
      - 1.pool.ntp.org

# --- Voice Assistant ---

ovi_voice_assistant:
  id: voice_asst
  transport: wifi
  codec: pcm
  time_id: sntp_time
  microphone:
    microphone: echo_mic
    channels: 0
    gain_factor: 4
  speaker: echo_speaker
  micro_wake_word: mww
  shared_audio_bus: true
  speaker_buffer_size: 32768

  on_client_connected:
    - logger.log: "Server connected"
    - micro_wake_word.start:
    - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
    - script.execute: control_led

  on_client_disconnected:
    - logger.log: "Server disconnected"
    - lambda: id(voice_asst).request_stop();
    - micro_wake_word.stop:
    - lambda: id(voice_assistant_phase) = ${voice_assist_not_ready_phase_id};
    - script.execute: control_led

  on_listening:
    - lambda: id(voice_assistant_phase) = ${voice_assist_listening_phase_id};
    - script.execute: control_led

  on_stt_vad_start:
    - lambda: id(voice_assistant_phase) = ${voice_assist_listening_phase_id};
    - script.execute: control_led

  on_stt_vad_end:
    - lambda: id(voice_assistant_phase) = ${voice_assist_thinking_phase_id};
    - script.execute: control_led

  on_tts_start:
    - lambda: id(voice_assistant_phase) = ${voice_assist_replying_phase_id};
    - script.execute: control_led

  on_end:
    - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
    - script.execute: control_led

  on_error:
    - if:
        condition:
          lambda: return code != "stt-no-text-recognized";
        then:
          - logger.log:
              format: "Voice error: %s — %s"
              args: ['code.c_str()', 'message.c_str()']
          - lambda: id(voice_assistant_phase) = ${voice_assist_error_phase_id};
          - script.execute: control_led

# --- LED state script ---

script:
  - id: control_led
    then:
      - lambda: |-
          auto call = id(status_led).turn_on();
          call.set_transition_length(0);
          if (id(mute_switch).state) {
            call.set_rgb(1.0f, 0.0f, 0.0f);
            call.set_brightness(0.5f);
          } else if (!id(voice_asst).is_connected()) {
            call.set_rgb(1.0f, 0.0f, 0.0f);
            call.set_brightness(0.3f);
          } else if (id(voice_assistant_phase) == ${voice_assist_listening_phase_id}) {
            call.set_rgb(0.0f, 1.0f, 0.0f);
            call.set_brightness(0.8f);
          } else if (id(voice_assistant_phase) == ${voice_assist_thinking_phase_id}) {
            call.set_rgb(1.0f, 0.6f, 0.0f);
            call.set_brightness(0.6f);
          } else if (id(voice_assistant_phase) == ${voice_assist_replying_phase_id}) {
            call.set_rgb(0.0f, 0.4f, 1.0f);
            call.set_brightness(0.8f);
          } else if (id(voice_assistant_phase) == ${voice_assist_error_phase_id}) {
            call.set_rgb(1.0f, 0.0f, 0.0f);
            call.set_brightness(1.0f);
          } else {
            // idle: dim white
            call.set_rgb(1.0f, 1.0f, 1.0f);
            call.set_brightness(0.05f);
          }
          call.perform();
