# Ovi — Open Voice Assistant — ESPHome config for Espressif ESP32-S3-BOX-3
#
# The BOX-3 has an ESP32-S3 with 16 MB flash and 8 MB octal PSRAM, dual
# ES7210 microphones, an ES8311 speaker DAC, and a 2.4" LCD touchscreen.
# This config drives the voice assistant over WiFi with LC3 codec — the
# display is not used.
#
# Hardware:
#   - ES7210 ADC (dual mic): I2C 0x40, I2S DIN=GPIO16
#   - ES8311 DAC (speaker):  I2C 0x18, I2S DOUT=GPIO15
#   - Shared I2S bus:        MCLK=GPIO2, BCLK=GPIO17, WS=GPIO45
#   - Speaker amplifier:     Enable=GPIO46
#   - Mute button:           GPIO0 (active low, inverted)
#
# Usage:
#   1. Install ESPHome: pip install esphome
#   2. Create esphome/secrets.yaml with wifi_ssid, wifi_password, api_encryption_key
#   3. Flash: esphome run esphome/s3-box-3.yaml
#   4. Start the server: ovi s3-box-3-XXXX.local

substitutions:
  wifi_ssid: !secret wifi_ssid
  wifi_password: !secret wifi_password

  voice_assist_idle_phase_id: "1"
  voice_assist_listening_phase_id: "3"
  voice_assist_thinking_phase_id: "4"
  voice_assist_replying_phase_id: "5"
  voice_assist_not_ready_phase_id: "10"
  voice_assist_error_phase_id: "11"

external_components:
  - source:
      type: local
      path: components
    components:
      - ovi_voice_assistant
      - ovi_audio_codec

esphome:
  name: s3-box-3
  friendly_name: S3-BOX-3 Voice
  name_add_mac_suffix: true
  min_version: "2025.3.0"
  on_boot:
    priority: 600
    then:
      - switch.turn_on: speaker_amp

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_ESP32S3_INSTRUCTION_CACHE_32KB: "y"
      CONFIG_SPIRAM_RODATA: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"

psram:
  mode: octal
  speed: 80MHz

logger:
  level: DEBUG

api:
  id: api_id
  reboot_timeout: 0s
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome

wifi:
  ssid: "${wifi_ssid}"
  password: "${wifi_password}"
  power_save_mode: none

# --- Hardware ---

i2c:
  - id: internal_i2c
    sda: GPIO8
    scl: GPIO18
    frequency: 400kHz

i2s_audio:
  - id: i2s_bus
    i2s_lrclk_pin:
      number: GPIO45
      ignore_strapping_warning: true
    i2s_bclk_pin: GPIO17
    i2s_mclk_pin: GPIO2

audio_adc:
  - platform: es7210
    id: es7210_adc
    i2c_id: internal_i2c
    bits_per_sample: 16bit
    sample_rate: 16000

audio_dac:
  - platform: es8311
    id: es8311_dac
    i2c_id: internal_i2c
    bits_per_sample: 16bit
    sample_rate: 16000

microphone:
  - platform: i2s_audio
    id: box_mic
    i2s_din_pin: GPIO16
    adc_type: external
    pdm: false
    sample_rate: 16000
    bits_per_sample: 16bit
    channel: left
    i2s_audio_id: i2s_bus

speaker:
  - platform: i2s_audio
    id: box_speaker
    i2s_dout_pin: GPIO15
    dac_type: external
    sample_rate: 16000
    bits_per_sample: 16bit
    channel: left
    i2s_audio_id: i2s_bus
    timeout: 500ms
    buffer_duration: 100ms
    audio_dac: es8311_dac

# --- Speaker amplifier & mute ---

switch:
  - platform: gpio
    id: speaker_amp
    pin:
      number: GPIO46
      ignore_strapping_warning: true
    restore_mode: ALWAYS_ON
    internal: true

  - platform: template
    id: mute_switch
    name: Mute
    icon: "mdi:microphone-off"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - microphone.mute:
    turn_off_action:
      - microphone.unmute:

# --- Mute button (top of device) ---

binary_sensor:
  - platform: gpio
    id: mute_button
    pin:
      number: GPIO0
      inverted: true
      mode:
        input: true
    on_multi_click:
      # Single press — toggle voice assistant
      - timing:
          - ON for at most 0.5s
          - OFF for at least 0.3s
        then:
          - if:
              condition:
                lambda: return id(voice_asst).is_running();
              then:
                - lambda: id(voice_asst).request_stop();
              else:
                - lambda: id(voice_asst).request_start("");
      # Long press — toggle mute
      - timing:
          - ON for at least 1.5s
        then:
          - switch.toggle: mute_switch

# --- Volume control ---

number:
  - platform: template
    id: speaker_volume
    name: "Speaker Volume"
    min_value: 0
    max_value: 100
    step: 5
    initial_value: 60
    restore_value: true
    optimistic: true
    unit_of_measurement: "%"
    set_action:
      - audio_dac.set_volume:
          id: es8311_dac
          volume: !lambda return x / 100.0;

# --- Wake Word ---

micro_wake_word:
  id: mww
  microphone: box_mic
  stop_after_detection: false
  models:
    - model:
        type: local
        path: custom_wake_word/hey_ovi.json
      id: hey_ovi
    - model: "https://github.com/kahrendt/microWakeWord/releases/download/stop/stop.json"
      id: stop
      internal: true
  on_wake_word_detected:
    - if:
        condition:
          switch.is_off: mute_switch
        then:
          - if:
              condition:
                lambda: return wake_word == "stop";
              then:
                - lambda: id(voice_asst).request_stop();
              else:
                - logger.log:
                    format: "Wake word detected: %s"
                    args: ['wake_word.c_str()']
                - if:
                    condition:
                      lambda: return !id(voice_asst).is_running();
                    then:
                      - lambda: id(voice_asst).request_start(wake_word);

# --- Voice Assistant ---

globals:
  - id: voice_assistant_phase
    type: int
    restore_value: no
    initial_value: ${voice_assist_not_ready_phase_id}

time:
  - platform: sntp
    id: sntp_time
    servers:
      - 0.pool.ntp.org
      - 1.pool.ntp.org

ovi_voice_assistant:
  id: voice_asst
  transport: wifi
  codec: lc3
  time_id: sntp_time
  microphone:
    microphone: box_mic
    channels: 0
    gain_factor: 4
  speaker: box_speaker
  micro_wake_word: mww
  shared_audio_bus: true
  speaker_buffer_size: 65536

  on_client_connected:
    - logger.log: "Server connected"
    - micro_wake_word.start:
    - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};

  on_client_disconnected:
    - logger.log: "Server disconnected"
    - lambda: id(voice_asst).request_stop();
    - micro_wake_word.stop:
    - lambda: id(voice_assistant_phase) = ${voice_assist_not_ready_phase_id};

  on_listening:
    - lambda: id(voice_assistant_phase) = ${voice_assist_listening_phase_id};

  on_stt_vad_start:
    - lambda: id(voice_assistant_phase) = ${voice_assist_listening_phase_id};

  on_stt_vad_end:
    - lambda: id(voice_assistant_phase) = ${voice_assist_thinking_phase_id};

  on_stt_end:
    - logger.log:
        format: "Heard: %s"
        args: ['x.c_str()']

  on_tts_start:
    - lambda: id(voice_assistant_phase) = ${voice_assist_replying_phase_id};

  on_end:
    - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};

  on_error:
    - if:
        condition:
          lambda: return code != "stt-no-text-recognized";
        then:
          - logger.log:
              format: "Voice error: %s — %s"
              args: ['code.c_str()', 'message.c_str()']
          - lambda: id(voice_assistant_phase) = ${voice_assist_error_phase_id};
